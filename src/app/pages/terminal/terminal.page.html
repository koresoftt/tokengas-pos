<ion-header>
  <ion-toolbar>
    <ion-title>NFC / QR</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding terminal-content">
  <p class="muted">
    Estado: <b>{{ scanning ? 'escaneando' : 'tag/código leído' }}</b>
  </p>

  <!-- Vista de escaneo -->
  <div class="center" *ngIf="scanning; else result">
    <!-- Escena -->
    <div class="nfc-scene" aria-hidden="true">
      <img class="card-behind" [src]="cardArt" alt="Tarjeta" />
      <div class="phone-wrap">
        <img class="phone" [src]="phoneArt" alt="Teléfono NFC" />
        <div class="waves"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="scan-ui">
      <!-- Spinner SOLO cuando hay QR en progreso -->
      <ion-spinner *ngIf="qrBusy" name="crescent" aria-label="Leyendo QR…"></ion-spinner>

      <div class="hints">
        <h2>Acerca una etiqueta… o lee un QR</h2>
      </div>

      <div class="actions">
        <ion-button
          class="btn-primary big"
          [disabled]="qrBusy"
          (click)="leerQr()">
          {{ qrBusy ? 'Leyendo…' : 'Leer QR' }}
        </ion-button>

        <ion-button
          class="btn-secondary big"
          fill="outline"
          (click)="abrirEntradaManual()">
          Entrada Manual
        </ion-button>
      </div>

      <ion-text color="medium" *ngIf="qrMsg">
        <small>{{ qrMsg }}</small>
      </ion-text>

      <!-- Fallback web (PWA/navegador) -->
      <div *ngIf="qrWeb" class="qr-fallback">
        <video id="qr-video" playsinline muted></video>
        <p class="muted">Modo fallback (web) activo: apunta el código QR…</p>
      </div>
    </div>
  </div>

  <!-- Resultado -->
  <ng-template #result>
    <ion-card>
      <ion-card-header>
        <ion-card-title>Track leído</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div class="uid mono">{{ uid || '—' }}</div>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" (click)="reset()">
      Seguir escaneando
    </ion-button>
  </ng-template>
</ion-content>
