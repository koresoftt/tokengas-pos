<ion-content class="loading-screen">
  <div class="center">
    <img src="assets/logo_tg.png" class="logo" alt="TokenGas" />

    <ion-spinner
      *ngIf="checking"
      name="crescent"
      aria-label="Verificando dispositivo"
    ></ion-spinner>

    <p class="msg">{{ statusMessage }}</p>

    <ion-button
      expand="block"
      *ngIf="!checking && canRetry"
      (click)="onRetry()"
    >
      Reintentar
    </ion-button>
  </div>
</ion-content>
